schema_version: "1.0"

extension:
  id: intake
  name: "Intake"
  version: "0.1.4"
  description: "Normalize PRD, visual design/spec packages, preview evidence, and test-case evidence into SDD-ready intake artifacts"
  author: "bigsmartben"
  repository: "https://github.com/bigsmartben/spec-kit-intake"
  homepage: "https://github.com/bigsmartben/spec-kit-intake"
  license: "MIT"
  category: "docs"
  effect: "read-write"

requires:
  speckit_version: ">=0.8.10.dev0"
  tools:
    - name: "figma-mcp"
      required: false

provides:
  commands:
    - name: "speckit.intake.visual-design"
      file: "commands/speckit.intake.visual-design.md"
      description: "Capture or validate visual design evidence, Figma-backed resources, visual requirements, and structured visual spec packages for the active feature"
    - name: "speckit.intake.prd"
      file: "commands/speckit.intake.prd.md"
      description: "Capture or validate PRD evidence and normalize product intent, scope, rules, and acceptance inputs for SDD workflows"
    - name: "speckit.intake.test-cases"
      file: "commands/speckit.intake.test-cases.md"
      description: "Capture or validate existing test cases and normalize scenarios, assertions, fixtures, and coverage evidence for SDD workflows"

  config:
    - name: "intake-config.yml"
      template: "config-template.yml"
      description: "Intake artifact paths and readiness defaults"
      required: false

hooks:
  before_specify:
    command: "speckit.intake.visual-design"
    optional: true
    prompt: "Validate visual design intake evidence before downstream SDD projection?"
    description: "Checks visual design intake readiness before downstream workflows project source evidence"

tags:
  - "intake"
  - "sdd"
  - "requirements"
  - "validation"
  - "figma"

defaults:
  artifacts:
    base_dir: "specs/{feature}/intake"
    visual_design_dir: "visual-design"
    previews_dir: "previews"
    visual_spec_package_dir: "visual-spec-package"
    prd_dir: "prd"
    test_cases_dir: "test-cases"
    prd_source_manifest: "source-manifest.yaml"
    visual_design_source_manifest: "design-source-manifest.yaml"
    test_cases_source_manifest: "source-manifest.yaml"
    source_files_dir: "source-files"
    prd_intake: "prd-intake.yaml"
    visual_requirements: "visual-requirements.yaml"
    test_case_intake: "test-case-intake.yaml"
    component_matrix_preview: "component-matrix-preview.html"
    component_coverage: "component-coverage.yaml"
    viewport_coverage: "viewport-coverage.yaml"
    visual_previews_known_gaps: "known-gaps.md"
    visual_previews_screenshots_dir: "screenshots"
    visual_previews_validator: "scripts/python/validate_visual_previews.py"
    visual_spec_package: "visual-spec.yaml"
    visual_spec_assertions: "visual-spec-assertions.yaml"
    visual_spec_package_evidence_packet: "visual-spec-evidence-packet.md"
    visual_spec_package_validator: "scripts/python/validate_visual_spec_package.py"
    prd_contract: "templates/intake-prd-contract.md"
    prd_evidence_packet_template: "templates/intake-prd-evidence-packet-template.md"
    visual_design_contract: "templates/intake-visual-design-contract.md"
    visual_design_evidence_packet_template: "templates/intake-visual-design-evidence-packet-template.md"
    visual_previews_contract: "templates/intake-visual-previews-contract.md"
    visual_spec_package_contract: "templates/intake-visual-spec-package-contract.md"
    visual_spec_package_evidence_packet_template: "templates/intake-visual-spec-package-evidence-packet-template.md"
    test_cases_contract: "templates/intake-test-cases-contract.md"
    test_cases_evidence_packet_template: "templates/intake-test-cases-evidence-packet-template.md"
    schemas_dir: "templates/schemas"
    prd_source_manifest_schema: "templates/schemas/prd-source-manifest.schema.json"
    prd_intake_schema: "templates/schemas/prd-intake.schema.json"
    visual_design_source_manifest_schema: "templates/schemas/visual-source-manifest.schema.json"
    visual_requirements_schema: "templates/schemas/visual-requirements.schema.json"
    test_cases_source_manifest_schema: "templates/schemas/test-case-source-manifest.schema.json"
    test_case_intake_schema: "templates/schemas/test-case-intake.schema.json"
    figma_metadata_index_schema: "templates/schemas/figma-metadata-index.schema.json"
    figma_node_inventory_schema: "templates/schemas/figma-node-inventory.schema.json"
    component_coverage_schema: "templates/schemas/component-coverage.schema.json"
    viewport_coverage_schema: "templates/schemas/viewport-coverage.schema.json"
    visual_spec_package_schema: "templates/schemas/visual-spec-package.schema.json"
    visual_spec_assertions_schema: "templates/schemas/visual-spec-assertions.schema.json"
    metadata_glob: "figma-metadata.part-*.xml"
    metadata_index: "figma-metadata.index.yaml"
    node_inventory: "figma-node-inventory.yaml"
    prd_evidence_packet: "evidence-packet.md"
    visual_design_evidence_packet: "visual-evidence-packet.md"
    test_cases_evidence_packet: "evidence-packet.md"
    comparison_report: "visual-comparison-report.md"
  readiness:
    require_prd_intake: true
    require_prd_acceptance_evidence: true
    require_prd_clarification_marking: true
    require_test_case_intake: true
    require_test_assertions: true
    require_test_fixture_evidence: true
    require_test_coverage_gaps: true
    allowed_source_types:
      - "image"
      - "pdf"
      - "markdown"
      - "figma"
    allowed_fidelity_levels:
      - "low"
      - "medium"
      - "high"
    require_source_integrity: true
    require_visual_requirements: true
    require_visual_spec_package: true
    require_visual_spec_package_source_refs: true
    require_visual_spec_package_provider_evidence: true
    require_visual_spec_package_ci_assertions: true
    require_visual_spec_package_provider_product_gap_separation: true
    require_visual_source_refs: true
    require_fidelity_rules_applied: true
    require_visual_parity_plan: true
    require_raw_metadata_complete_for_figma: true
    require_selected_subtree_complete_for_figma: true
    require_node_inventory_coverage_for_figma: "100%"
    require_parity_passed_for_figma: true
    require_bounded_inference_for_visual_claims: true
    fail_on_unbounded_inference_for_figma: true
    fail_on_unsupported_visual_claims: true
    fail_on_blocker_lint_errors: true
  capture:
    preserve_original_sources: true
    source_file_dir: "source-files"
    prd_intake_file: "prd-intake.yaml"
    visual_requirements_file: "visual-requirements.yaml"
    test_case_intake_file: "test-case-intake.yaml"
    shard_prefix: "figma-metadata.part-"
    preserve_raw_metadata: true
    allow_screenshot_only_intake: true
    default_screenshot_level: "L0"
