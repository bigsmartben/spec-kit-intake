name: Extension Release Artifact

permissions:
  contents: read

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Defaults to extension.yml or tag version."
        required: false
        type: string

concurrency:
  group: extension-release-artifact-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    env:
      INPUT_VERSION: ${{ inputs.version || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install packaging dependencies
        run: python3 -m pip install --upgrade PyYAML

      - name: Build and verify extension artifact
        id: artifact
        run: |
          python3 - <<'PY'
          import os
          import json
          import re
          import zipfile
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile, ZipInfo

          import yaml

          root = Path.cwd()
          manifest = yaml.safe_load(Path("extension.yml").read_text(encoding="utf-8"))
          extension = manifest["extension"]
          extension_id = extension["id"]
          manifest_version = extension["version"]
          tag_version = os.environ.get("GITHUB_REF_NAME", "")
          if tag_version.startswith("v"):
              tag_version = tag_version[1:]
          input_version = os.environ.get("INPUT_VERSION", "")
          version = input_version or tag_version or manifest_version

          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              raise SystemExit(f"version must use X.Y.Z format: {version}")
          if tag_version and version != tag_version:
              raise SystemExit(f"version {version} does not match tag v{tag_version}")
          if version != manifest_version:
              raise SystemExit(f"version {version} does not match extension.yml {manifest_version}")

          include_roots = [
              "extension.yml",
              "README.md",
              "CHANGELOG.md",
              "LICENSE",
              "commands",
              "scripts",
              "templates",
              "schemas",
              "config-template.yml",
          ]
          forbidden_prefixes = (".git/", ".github/", "tests/", "docs/superpowers/")
          files = []
          for item in include_roots:
              path = root / item
              if path.is_file():
                  files.append(path)
              elif path.is_dir():
                  files.extend(file for file in path.rglob("*") if file.is_file())

          zip_name = f"{extension_id}-v{version}.zip"
          with ZipFile(zip_name, "w", compression=ZIP_DEFLATED) as archive:
              for file_path in sorted(files, key=lambda path: path.relative_to(root).as_posix()):
                  name = file_path.relative_to(root).as_posix()
                  if name.startswith(forbidden_prefixes):
                      continue
                  info = ZipInfo(name, date_time=(1980, 1, 1, 0, 0, 0))
                  info.compress_type = ZIP_DEFLATED
                  info.external_attr = 0o644 << 16
                  archive.writestr(info, file_path.read_bytes())

          required = {"extension.yml", "README.md", "LICENSE"}
          for command in manifest["provides"]["commands"]:
              required.add(command["file"])
          for config in manifest["provides"].get("config", []) or []:
              template = config.get("template")
              if template:
                  required.add(template)

          with zipfile.ZipFile(zip_name) as archive:
              names = set(archive.namelist())
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"artifact missing required entries: {missing}")
          forbidden = sorted(name for name in names if name.startswith(forbidden_prefixes))
          if forbidden:
              raise SystemExit(f"artifact contains forbidden entries: {forbidden[:10]}")

          repository = os.environ["GITHUB_REPOSITORY"]
          source_commit = os.environ["GITHUB_SHA"]
          if tag_version:
              download_url = f"https://github.com/{repository}/archive/refs/tags/v{version}.zip"
          else:
              download_url = f"https://github.com/{repository}/archive/{source_commit}.zip"
          provenance = {
              "repository_url": f"https://github.com/{repository}",
              "release_version": version,
              "source_commit_sha": source_commit,
              "download_url": download_url,
              "validation_evidence": {
                  "workflow": os.environ["GITHUB_WORKFLOW"],
                  "run_id": os.environ["GITHUB_RUN_ID"],
                  "artifact_name": zip_name,
                  "manifest_version": manifest_version,
                  "required_entries_verified": sorted(required),
                  "forbidden_prefixes_checked": list(forbidden_prefixes),
              },
          }
          provenance_name = "release-provenance.json"
          Path(provenance_name).write_text(
              json.dumps(provenance, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"zip_name={zip_name}\n")
              output.write(f"provenance_name={provenance_name}\n")
          PY

      - name: Upload verified artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.zip_name }}
          path: ${{ steps.artifact.outputs.zip_name }}

      - name: Upload release provenance
        uses: actions/upload-artifact@v4
        with:
          name: release-provenance
          path: ${{ steps.artifact.outputs.provenance_name }}
